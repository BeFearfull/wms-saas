# Development Profile
spring.profiles=dev

# Show SQL queries in development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.com.wms=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Database
spring.jpa.hibernate.ddl-auto=create-drop

# Development database
spring.datasource.url=jdbc:postgresql://localhost:5432/wms_saas_dev
spring.datasource.username=postgres
spring.datasource.password=password

# JWT - longer for development
jwt.expiration.ms=604800000

# CORS - more permissive in development
cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000
