spring:
  profiles: prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

logging:
  level:
    root: WARN
    com.wms: INFO
  file:
    name: /var/log/wms/application.log
    max-size: 10MB
    max-history: 30

server:
  compression:
    enabled: true
    min-response-size: 1024
